<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>히림의 버킷리스트</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Spectral:ital,wght@0,400;0,500;1,400;1,500&family=Noto+Serif+KR:wght@300;400;500&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F5F0E8;
  --bg2: #EDE7D9;
  --surface: #FDFAF4;
  --border: #D8CEB8;
  --border2: #C8BC9A;
  --text: #2A2418;
  --text2: #6A5C40;
  --text3: #9A8C70;
  --accent: #7A5C2E;
  --done-bg: #EBF2E8;
  --done-border: #A8C4A0;
  --done-text: #4A6A44;
}

html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'Noto Serif KR', Georgia, serif; }

body::before {
  content: ''; position: fixed; inset: 0;
  background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(180,160,120,0.06) 27px, rgba(180,160,120,0.06) 28px);
  pointer-events: none; z-index: 0;
}

.wrap { position: relative; z-index: 1; }

.header { padding: 44px 24px 28px; text-align: center; border-bottom: 1px solid var(--border); }
.header-en { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 4px; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; }
.header h1 { font-family: 'Spectral', serif; font-size: 26px; font-weight: 400; font-style: italic; color: var(--text); margin-bottom: 6px; }
.header-sub { font-size: 12px; color: var(--text3); font-style: italic; line-height: 1.6; margin-bottom: 18px; }
.header-stats { display: flex; justify-content: center; gap: 28px; }
.hstat-num { font-family: 'DM Mono', monospace; font-size: 20px; color: var(--accent); line-height: 1; margin-bottom: 3px; }
.hstat-label { font-family: 'DM Mono', monospace; font-size: 8px; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; }

.section { padding: 28px 20px 0; max-width: 580px; margin: 0 auto; }
.section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.section-line { flex: 1; height: 1px; background: var(--border); }
.section-title { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 3px; color: var(--text3); text-transform: uppercase; white-space: nowrap; }

.main-card { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); overflow: hidden; }
.main-card.all-done { background: var(--done-bg); border-color: var(--done-border); }

.main-header { display: flex; align-items: center; gap: 11px; padding: 13px 14px; cursor: pointer; -webkit-tap-highlight-color: transparent; }

.main-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.main-check.partial { border-color: var(--accent); }
.main-check.partial::after { content: ''; display: block; width: 8px; height: 2px; background: var(--accent); border-radius: 1px; }
.main-check.full { background: var(--done-text); border-color: var(--done-text); }
.main-check.full::after { content: ''; display: block; width: 5px; height: 8px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg) translate(-0.5px, -1px); }

.main-info { flex: 1; min-width: 0; }
.main-title { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.3; margin-bottom: 2px; }
.main-card.all-done .main-title { color: var(--done-text); }
.main-progress { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text3); }

/* Inline edit input */
.inline-edit {
  font-family: 'Noto Serif KR', serif;
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  background: transparent;
  border: none;
  border-bottom: 1.5px solid var(--accent);
  outline: none;
  width: 100%;
  padding: 2px 0;
  line-height: 1.3;
}

.sub-inline-edit {
  font-family: 'Noto Serif KR', serif;
  font-size: 13px;
  color: var(--text2);
  background: transparent;
  border: none;
  border-bottom: 1.5px solid var(--accent);
  outline: none;
  flex: 1;
  padding: 1px 0;
  min-width: 0;
}

.edit-hint { font-family: 'DM Mono', monospace; font-size: 8px; color: var(--text3); letter-spacing: 0.5px; margin-top: 3px; }

.main-chevron { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); flex-shrink: 0; transition: transform 0.2s; padding: 2px 4px; }
.main-chevron.open { transform: rotate(90deg); }

.main-memo-area { padding: 0 14px 12px 45px; border-top: 1px dashed var(--border); display: none; }
.main-memo-area.open { display: block; }
.main-memo { width: 100%; font-family: 'Noto Serif KR', serif; font-size: 12px; color: var(--text2); background: transparent; border: none; outline: none; resize: none; line-height: 1.8; padding: 10px 0 0; min-height: 48px; }
.main-memo::placeholder { color: var(--text3); font-style: italic; }

.sub-items { border-top: 1px solid var(--border); }

.sub-item { border-bottom: 1px solid var(--border); overflow: hidden; }
.sub-item:last-child { border-bottom: none; }
.sub-item.sub-done { background: var(--done-bg); }

.sub-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px 10px 44px; -webkit-tap-highlight-color: transparent; }

.sub-check { width: 16px; height: 16px; border-radius: 3px; border: 1.5px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.sub-check.on { background: var(--done-text); border-color: var(--done-text); }
.sub-check.on::after { content: ''; display: block; width: 3px; height: 6px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg) translate(-0.5px, -1px); }

.sub-title { flex: 1; font-size: 13px; color: var(--text2); line-height: 1.4; cursor: text; min-width: 0; }
.sub-item.sub-done .sub-title { color: var(--done-text); text-decoration: line-through; }

.sub-expand { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); flex-shrink: 0; padding: 2px 4px; transition: transform 0.2s; cursor: pointer; }
.sub-expand.open { transform: rotate(45deg); }

.sub-del { font-size: 14px; color: var(--text3); padding: 2px 4px; cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }

.sub-detail { display: none; padding: 0 14px 12px 70px; border-top: 1px dashed var(--border); }
.sub-detail.open { display: block; }

.sub-memo { width: 100%; font-family: 'Noto Serif KR', serif; font-size: 12px; color: var(--text2); background: transparent; border: none; outline: none; resize: none; line-height: 1.8; padding: 8px 0 6px; min-height: 44px; }
.sub-memo::placeholder { color: var(--text3); font-style: italic; }

.sub-detail-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 6px; border-top: 1px solid var(--border); }
.sub-done-date { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--done-text); }

.photo-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text3); letter-spacing: 0.5px; cursor: pointer; text-transform: uppercase; padding: 4px 9px; border: 1px solid var(--border2); border-radius: 2px; -webkit-tap-highlight-color: transparent; }
.photo-label:active { background: var(--bg2); }
.photo-input { display: none; }

.sub-photo { width: 100%; margin-top: 8px; display: none; }
.sub-photo img { width: 100%; max-height: 180px; object-fit: cover; border-radius: 3px; display: block; }

.add-sub-row { display: flex; align-items: center; gap: 10px; padding: 8px 14px 8px 44px; border-top: 1px dashed var(--border); }
.add-sub-input { flex: 1; font-family: 'Noto Serif KR', serif; font-size: 12px; color: var(--text); background: transparent; border: none; border-bottom: 1px solid var(--border); outline: none; padding: 2px 0 4px; }
.add-sub-input::placeholder { color: var(--text3); font-style: italic; }
.add-sub-btn { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); background: none; border: 1px solid var(--accent); border-radius: 2px; padding: 4px 10px; cursor: pointer; white-space: nowrap; }

.add-main-card { border: 1px dashed var(--border2); border-radius: 3px; margin-bottom: 12px; }
.add-main-btn { width: 100%; display: flex; align-items: center; gap: 10px; padding: 11px 14px; background: transparent; border: none; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.add-main-btn:active { background: var(--bg2); }
.add-main-icon { width: 20px; height: 20px; border-radius: 50%; border: 1.5px dashed var(--text3); display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--text3); }
.add-main-text { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 1px; }

.add-main-form { display: none; padding: 12px 14px; border-top: 1px solid var(--border); }
.add-main-form.open { display: block; }
.add-main-input { width: 100%; font-family: 'Noto Serif KR', serif; font-size: 14px; color: var(--text); background: transparent; border: none; border-bottom: 1px solid var(--border); outline: none; padding: 4px 0 8px; margin-bottom: 10px; }
.add-main-input::placeholder { color: var(--text3); font-style: italic; }
.add-main-form-btns { display: flex; gap: 8px; }
.form-save { flex: 1; padding: 9px; border-radius: 2px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-family: 'DM Mono', monospace; font-size: 10px; cursor: pointer; }
.form-cancel { padding: 9px 14px; border-radius: 2px; border: 1px solid var(--border2); background: transparent; color: var(--text3); font-family: 'DM Mono', monospace; font-size: 10px; cursor: pointer; }

.footer { text-align: center; padding: 48px 0 32px; font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text3); letter-spacing: 2px; }
</style>
</head>
<body>
<div class="wrap">

<div class="header">
  <div class="header-en">Bucket List — Before & After MBA</div>
  <h1>히림의 버킷리스트</h1>
  <div class="header-sub">합격 발표 이후, 출국 전, 그리고 그 이후의 것들</div>
  <div class="header-stats">
    <div class="hstat"><div class="hstat-num" id="totalCount">0</div><div class="hstat-label">총 항목</div></div>
    <div class="hstat"><div class="hstat-num" id="doneCount">0</div><div class="hstat-label">완료</div></div>
    <div class="hstat"><div class="hstat-num" id="pctCount">0%</div><div class="hstat-label">달성률</div></div>
  </div>
</div>

<div id="sectionsWrap"></div>
<div class="footer">made with love, for the life ahead ✦</div>
</div>

<script>
const DEFAULT = [
  {
    id:'s_admit', title:'합격 발표 후',
    items:[
      { id:'m1', title:'부모님이랑 국내여행', memo:'',
        subs:[
          {id:'s1', title:'밀양 위양지',      memo:'', done:false, doneDate:'', photo:null},
          {id:'s2', title:'함안 무진정',       memo:'', done:false, doneDate:'', photo:null},
          {id:'s3', title:'칠곡 가산수피아',   memo:'', done:false, doneDate:'', photo:null},
        ]
      }
    ]
  },
  {
    id:'s_before', title:'출국 전',
    items:[
      { id:'m2', title:'산티아고 순례길 걷기', memo:'',
        subs:[
          {id:'s4', title:'Camino Francés (프랑스길)', memo:'', done:false, doneDate:'', photo:null},
        ]
      }
    ]
  },
  { id:'s_mba', title:'MBA 중', items:[] }
];

let state;
try { state = JSON.parse(localStorage.getItem('bucket_v3') || 'null'); } catch(e) {}
if (!state) { state = { sections: JSON.parse(JSON.stringify(DEFAULT)) }; save(); }

function save() { try { localStorage.setItem('bucket_v3', JSON.stringify(state)); } catch(e) {} }

const openMain = {};
const openSub  = {};
const openForm = {};
const editingMain = {}; // itemId -> bool
const editingSub  = {}; // subId -> bool

function getSubStatus(item) {
  if (!item.subs.length) return 'none';
  const d = item.subs.filter(s => s.done).length;
  return d === 0 ? 'none' : d === item.subs.length ? 'full' : 'partial';
}

function updateStats() {
  let total = 0, done = 0;
  state.sections.forEach(sec => sec.items.forEach(it =>
    it.subs.forEach(s => { total++; if(s.done) done++; })
  ));
  document.getElementById('totalCount').textContent = total;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('pctCount').textContent = (total ? Math.round(done/total*100) : 0) + '%';
}

function findSub(subId) {
  for (const sec of state.sections)
    for (const it of sec.items)
      for (const s of it.subs)
        if (s.id === subId) return s;
  return null;
}

function findItem(itemId) {
  for (const sec of state.sections)
    for (const it of sec.items)
      if (it.id === itemId) return it;
  return null;
}

function toggleSubDone(subId) {
  const s = findSub(subId);
  if (!s) return;
  s.done = !s.done;
  s.doneDate = s.done ? new Date().toISOString().slice(0,10) : '';
  save(); render();
}

function toggleAllSubs(sIdx, iIdx) {
  const item = state.sections[sIdx].items[iIdx];
  const allDone = getSubStatus(item) === 'full';
  item.subs.forEach(s => { s.done = !allDone; s.doneDate = s.done ? new Date().toISOString().slice(0,10) : ''; });
  save(); render();
}

function saveMainTitle(itemId, val) {
  const item = findItem(itemId);
  if (item && val.trim()) item.title = val.trim();
  editingMain[itemId] = false;
  save(); render();
}

function saveSubTitle(subId, val) {
  const s = findSub(subId);
  if (s && val.trim()) s.title = val.trim();
  editingSub[subId] = false;
  save(); render();
}

function saveMainMemo(itemId, val) { const i = findItem(itemId); if(i) { i.memo = val; save(); } }
function saveSubMemo(subId, val)   { const s = findSub(subId);   if(s) { s.memo = val; save(); } }

function handleSubPhoto(subId, input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => { const s = findSub(subId); if(s){ s.photo = e.target.result; save(); render(); } };
  reader.readAsDataURL(file);
}

function addSub(sIdx, iIdx, inputEl) {
  const val = inputEl.value.trim(); if (!val) return;
  state.sections[sIdx].items[iIdx].subs.push({ id:'s_'+Date.now(), title:val, memo:'', done:false, doneDate:'', photo:null });
  inputEl.value = ''; save(); render();
}

function deleteSub(sIdx, iIdx, subId) {
  state.sections[sIdx].items[iIdx].subs = state.sections[sIdx].items[iIdx].subs.filter(s => s.id !== subId);
  save(); render();
}

function addMainItem(sIdx, inputEl) {
  const val = inputEl.value.trim(); if (!val) return;
  state.sections[sIdx].items.push({ id:'m_'+Date.now(), title:val, memo:'', subs:[] });
  openForm[state.sections[sIdx].id] = false;
  save(); render();
}

function render() {
  const wrap = document.getElementById('sectionsWrap');
  wrap.innerHTML = '';

  state.sections.forEach((sec, sIdx) => {
    const secEl = document.createElement('div');
    secEl.className = 'section';
    secEl.innerHTML =
      `<div class="section-header">
        <div class="section-line"></div>
        <div class="section-title">${sec.title}</div>
        <div class="section-line"></div>
      </div>`;

    sec.items.forEach((item, iIdx) => {
      const status = getSubStatus(item);
      const allDone = status === 'full';
      const isOpen = !!openMain[item.id];
      const isEditingTitle = !!editingMain[item.id];

      const card = document.createElement('div');
      card.className = 'main-card' + (allDone ? ' all-done' : '');

      // Main header
      const mh = document.createElement('div');
      mh.className = 'main-header';
      if (!isEditingTitle) {
        mh.onclick = () => { openMain[item.id] = !openMain[item.id]; render(); };
      }

      const mc = document.createElement('div');
      mc.className = 'main-check ' + (status==='full'?'full':status==='partial'?'partial':'');
      mc.onclick = (e) => { e.stopPropagation(); toggleAllSubs(sIdx, iIdx); };

      const mi = document.createElement('div');
      mi.className = 'main-info';

      if (isEditingTitle) {
        // Inline edit mode
        const inp = document.createElement('input');
        inp.className = 'inline-edit';
        inp.value = item.title;
        inp.onclick = e => e.stopPropagation();
        inp.onkeydown = (e) => {
          if (e.key === 'Enter') saveMainTitle(item.id, inp.value);
          if (e.key === 'Escape') { editingMain[item.id] = false; render(); }
        };
        inp.onblur = () => saveMainTitle(item.id, inp.value);
        mi.appendChild(inp);
        const hint = document.createElement('div');
        hint.className = 'edit-hint';
        hint.textContent = 'ENTER 저장 · ESC 취소';
        mi.appendChild(hint);
        setTimeout(() => inp.focus(), 50);
      } else {
        mi.innerHTML =
          `<div class="main-title">${item.title}</div>` +
          (item.subs.length ? `<div class="main-progress">${item.subs.filter(s=>s.done).length}/${item.subs.length} 완료</div>` : '');
        // Long press / double tap to edit title
        let pressTimer;
        mi.addEventListener('touchstart', () => { pressTimer = setTimeout(() => { editingMain[item.id] = true; render(); }, 600); });
        mi.addEventListener('touchend', () => clearTimeout(pressTimer));
        mi.ondblclick = (e) => { e.stopPropagation(); editingMain[item.id] = true; render(); };
      }

      const chevron = document.createElement('div');
      chevron.className = 'main-chevron' + (isOpen?' open':'');
      chevron.textContent = '▶';

      mh.appendChild(mc); mh.appendChild(mi); mh.appendChild(chevron);
      card.appendChild(mh);

      // Main memo
      const memoArea = document.createElement('div');
      memoArea.className = 'main-memo-area' + (isOpen?' open':'');
      const memoTA = document.createElement('textarea');
      memoTA.className = 'main-memo';
      memoTA.placeholder = '전체 메모 ...';
      memoTA.value = item.memo || '';
      memoTA.rows = 2;
      memoTA.onclick = e => e.stopPropagation();
      memoTA.oninput = () => saveMainMemo(item.id, memoTA.value);
      memoArea.appendChild(memoTA);
      card.appendChild(memoArea);

      // Sub items
      const subContainer = document.createElement('div');
      subContainer.className = 'sub-items';

      item.subs.forEach((sub, subIdx) => {
        const isSubOpen = !!openSub[sub.id];
        const isSubEditing = !!editingSub[sub.id];

        const subEl = document.createElement('div');
        subEl.className = 'sub-item' + (sub.done?' sub-done':'');

        const sh = document.createElement('div');
        sh.className = 'sub-header';

        const sc = document.createElement('div');
        sc.className = 'sub-check' + (sub.done?' on':'');
        sc.onclick = (e) => { e.stopPropagation(); toggleSubDone(sub.id); };

        if (isSubEditing) {
          const inp = document.createElement('input');
          inp.className = 'sub-inline-edit';
          inp.value = sub.title;
          inp.onclick = e => e.stopPropagation();
          inp.onkeydown = (e) => {
            if (e.key === 'Enter') saveSubTitle(sub.id, inp.value);
            if (e.key === 'Escape') { editingSub[sub.id] = false; render(); }
          };
          inp.onblur = () => saveSubTitle(sub.id, inp.value);
          sh.appendChild(sc);
          sh.appendChild(inp);
          setTimeout(() => inp.focus(), 50);
        } else {
          const st = document.createElement('div');
          st.className = 'sub-title';
          st.textContent = sub.title;
          // Long press / double tap to edit
          let pressTimer;
          st.addEventListener('touchstart', (e) => { pressTimer = setTimeout(() => { e.preventDefault(); editingSub[sub.id] = true; render(); }, 600); });
          st.addEventListener('touchend', () => clearTimeout(pressTimer));
          st.ondblclick = (e) => { e.stopPropagation(); editingSub[sub.id] = true; render(); };

          const se = document.createElement('div');
          se.className = 'sub-expand' + (isSubOpen?' open':'');
          se.textContent = '+';
          se.onclick = (e) => { e.stopPropagation(); openSub[sub.id] = !openSub[sub.id]; render(); };

          const sd = document.createElement('div');
          sd.className = 'sub-del';
          sd.textContent = '×';
          sd.onclick = (e) => { e.stopPropagation(); deleteSub(sIdx, iIdx, sub.id); };

          sh.appendChild(sc); sh.appendChild(st); sh.appendChild(se); sh.appendChild(sd);
        }

        subEl.appendChild(sh);

        // Sub detail
        const detail = document.createElement('div');
        detail.className = 'sub-detail' + (isSubOpen?' open':'');

        const subMemo = document.createElement('textarea');
        subMemo.className = 'sub-memo';
        subMemo.placeholder = '메모 · 기대되는 것 · 함께할 사람 ...';
        subMemo.value = sub.memo || '';
        subMemo.rows = 3;
        subMemo.onclick = e => e.stopPropagation();
        subMemo.oninput = () => saveSubMemo(sub.id, subMemo.value);

        const detFooter = document.createElement('div');
        detFooter.className = 'sub-detail-footer';

        const dateEl = document.createElement('div');
        dateEl.className = 'sub-done-date';
        dateEl.textContent = sub.done ? '✓ ' + sub.doneDate + ' 완료' : '';

        const photoLabel = document.createElement('label');
        photoLabel.className = 'photo-label';
        photoLabel.textContent = '📷 사진';
        const photoInput = document.createElement('input');
        photoInput.className = 'photo-input';
        photoInput.type = 'file';
        photoInput.accept = 'image/*';
        photoInput.onchange = () => handleSubPhoto(sub.id, photoInput);
        photoLabel.appendChild(photoInput);

        detFooter.appendChild(dateEl);
        detFooter.appendChild(photoLabel);

        const photoPrev = document.createElement('div');
        photoPrev.className = 'sub-photo';
        if (sub.photo) { photoPrev.style.display = 'block'; photoPrev.innerHTML = `<img src="${sub.photo}" />`; }

        detail.appendChild(subMemo);
        detail.appendChild(detFooter);
        detail.appendChild(photoPrev);
        subEl.appendChild(detail);
        subContainer.appendChild(subEl);
      });

      // Add sub input (when main is open)
      if (isOpen) {
        const addSubRow = document.createElement('div');
        addSubRow.className = 'add-sub-row';
        const addSubInput = document.createElement('input');
        addSubInput.className = 'add-sub-input';
        addSubInput.placeholder = '서브 항목 추가 ...';
        addSubInput.onkeydown = (e) => { if(e.key==='Enter') addSub(sIdx, iIdx, addSubInput); };
        const addSubBtn = document.createElement('button');
        addSubBtn.className = 'add-sub-btn';
        addSubBtn.textContent = '추가';
        addSubBtn.onclick = () => addSub(sIdx, iIdx, addSubInput);
        addSubRow.appendChild(addSubInput);
        addSubRow.appendChild(addSubBtn);
        subContainer.appendChild(addSubRow);
      }

      card.appendChild(subContainer);
      secEl.appendChild(card);
    });

    // Add main item
    const isFormOpen = !!openForm[sec.id];
    const addMain = document.createElement('div');
    addMain.className = 'add-main-card';

    const addBtn = document.createElement('button');
    addBtn.className = 'add-main-btn';
    addBtn.style.display = isFormOpen ? 'none' : 'flex';
    addBtn.innerHTML = '<div class="add-main-icon">+</div><div class="add-main-text">항목 추가</div>';
    addBtn.onclick = () => { openForm[sec.id] = true; render(); };

    const addForm = document.createElement('div');
    addForm.className = 'add-main-form' + (isFormOpen?' open':'');
    const addInput = document.createElement('input');
    addInput.className = 'add-main-input';
    addInput.placeholder = '하고 싶은 것 ...';
    addInput.onkeydown = (e) => { if(e.key==='Enter') addMainItem(sIdx, addInput); };
    const formBtns = document.createElement('div');
    formBtns.className = 'add-main-form-btns';
    const saveBtn = document.createElement('button');
    saveBtn.className = 'form-save';
    saveBtn.textContent = '추가하기';
    saveBtn.onclick = () => addMainItem(sIdx, addInput);
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'form-cancel';
    cancelBtn.textContent = '취소';
    cancelBtn.onclick = () => { openForm[sec.id] = false; render(); };
    formBtns.appendChild(saveBtn); formBtns.appendChild(cancelBtn);
    addForm.appendChild(addInput); addForm.appendChild(formBtns);
    addMain.appendChild(addBtn); addMain.appendChild(addForm);
    secEl.appendChild(addMain);
    wrap.appendChild(secEl);
  });

  updateStats();
}

render();
</script>
</body>
</html>
